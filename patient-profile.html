<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile - MedProfile</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">MedProfile</a>
            <nav class="main-nav">
                <a href="patient-dashboard.html">Dashboard</a>
                <a href="patient-profile.html" class="active">Profile</a>
                <a href="search-doctors.html">Find a Doctor</a>
                <a href="reports-vault.html">Reports</a>
                <a href="index.html">Logout</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="profile" style="padding: 4rem 0;">
            <div class="container">
                <div class="card">
                    <div style="display: flex; align-items: center; margin-bottom: 2rem;">
                        <img src="https://placehold.co/100x100/632024/fff?text=M" alt="Patient Photo" style="border-radius: 50%; width: 150px; height: 150px; margin-right: 2rem;">
                        <div>
                            <h1 style="margin-bottom: 0.5rem;">Mrunal</h1>
                            <p style="color: var(--text-light);">Medical Profile ID: MED123456789</p>
                            <a href="#" class="btn btn-secondary" style="margin-top: 1rem;">Edit Profile</a>
                        </div>
                    </div>

                    <div style="border-top: 1px solid var(--border-color); padding-top: 2rem;">
                        <h2>Health History</h2>
                        <ul style="list-style: none; padding: 0;">
                            <li style="margin-bottom: 1rem;"><strong>Allergies:</strong> Penicillin</li>
                            <li style="margin-bottom: 1rem;"><strong>Current Medications:</strong> None</li>
                            <li style="margin-bottom: 1rem;"><strong>Past Conditions:</strong> Asthma (Childhood)</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 MedProfile. All rights reserved.</p>
            <nav>
                <a href="privacy-terms.html">Privacy & Terms</a>
                <a href="about.html">About</a>
            </nav>
        </div>
    </footer>

</body>
</html>
